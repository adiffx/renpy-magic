# Build and deploy GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build HTML from Markdown
        run: |
          mkdir -p _site
          cp -r images _site/images
          npm install marked
          node -e "
            const fs = require('fs');
            const { marked } = require('marked');
            const readme = fs.readFileSync('README.md', 'utf8');
            const year = new Date().getFullYear();
            const html = \`<!DOCTYPE html>
          <html lang=\"en\">
          <head>
            <meta charset=\"UTF-8\">
            <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
            <title>Ren'Py Magic - VS Code Extension</title>
            <style>
              * { box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; margin: 0; padding: 0; line-height: 1.6; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
              header { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); color: white; padding: 1.5rem 2rem; }
              header .site-title { color: white; text-decoration: none; font-weight: 600; font-size: 1.3rem; display: block; }
              header .site-title:hover { text-decoration: underline; }
              header .tagline { color: rgba(255,255,255,0.8); font-size: 0.9rem; margin-top: 0.25rem; }
              main { max-width: 900px; margin: 0 auto; padding: 2rem; flex: 1; width: 100%; }
              h1, h2, h3 { color: #2c3e50; }
              h1 { border-bottom: 2px solid #3498db; padding-bottom: 0.5rem; }
              h2 { border-bottom: 1px solid #eee; padding-bottom: 0.3rem; margin-top: 2rem; }
              code { background: #f4f4f4; padding: 0.2rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
              pre { background: #2d2d2d; color: #f8f8f2; padding: 1rem; border-radius: 5px; overflow-x: auto; }
              pre code { background: none; padding: 0; color: inherit; }
              a { color: #3498db; }
              ul { padding-left: 1.5rem; }
              li { margin: 0.3rem 0; }
              footer { background: #2c3e50; color: #ccc; padding: 1.5rem 2rem; text-align: center; font-size: 0.9rem; }
              footer a { color: #3498db; }
              footer .links { margin-bottom: 0.5rem; }
              footer .links a { margin: 0 0.5rem; }
            </style>
          </head>
          <body>
            <header>
              <a class=\"site-title\" href=\"https://github.com/adiffx\">@adiffx</a>
              <div class=\"tagline\">VS Code extensions for game developers</div>
            </header>
            <main>
              \${marked.parse(readme)}
            </main>
            <footer>
              <div class=\"links\">
                <a href=\"https://github.com/adiffx/renpy-magic\">GitHub Repository</a>
                <span>|</span>
                <a href=\"https://github.com/adiffx/renpy-magic/issues\">Report Issues</a>
              </div>
              <div>&copy; \${year} adiffx. Released under MIT License.</div>
            </footer>
          </body>
          </html>\`;
            fs.writeFileSync('_site/index.html', html);
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
